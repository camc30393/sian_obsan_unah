<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SIAN - Sistema de Información Alimentaria y Nutricional. Prototipo no funcional para propuesta DICITH UNAH." />
  <meta name="author" content="Christian Alexis Manzanares Cruz - ORCID 0009-0004-7419-0449" />
  <title>SIAN · Sistema de Información Alimentaria y Nutricional</title>

  <!-- ========================================================
       DEPENDENCIAS LOCALES (vendorizadas) — sin CDN, sin build, offline.
       Todas las librerías viven en ./assets/vendor/ con versión fija.
       Motivo: evitar que un CDN sin pin (p. ej. el salto de Babel 7→8) vuelva
       a romper el prototipo. Ver assets/vendor/VENDOR.md.
       ======================================================== -->

  <!-- Tipografía Inter (auto-hospedada, fuente variable, reemplaza Google Fonts) -->
  <link rel="stylesheet" href="./assets/vendor/fonts/inter.css" />

  <!-- Leaflet CSS para mapas (pre-carga, se usará en sesión 5) -->
  <link rel="stylesheet" href="./assets/vendor/leaflet/leaflet.css" />

  <!-- Tailwind precompilado a CSS estático (incluye preflight + paleta unah).
       Generado con tailwindcss@3.4.16 escaneando index.html + js/**/*.js.
       Si se agregan NUEVAS utilidades Tailwind, recompilar (ver VENDOR.md). -->
  <link rel="stylesheet" href="./assets/vendor/tailwind/tailwind.css" />

  <!-- Tema visual del SIAN -->
  <link rel="stylesheet" href="./assets/css/theme.css" />

  <!-- React 18 (development build para mejor diagnóstico en prototipo) -->
  <script src="./assets/vendor/react/react.development.js"></script>
  <script src="./assets/vendor/react-dom/react-dom.development.js"></script>

  <!-- Babel standalone 7.26.4 (runtime clásico → React.createElement).
       Fijado localmente: Babel 8 cambió preset-react al "automatic runtime"
       y emitía `import { jsx } from "react/jsx-runtime"`, lo que rompía los
       <script type="text/babel"> con "Cannot use import statement outside a module". -->
  <script src="./assets/vendor/babel/babel.min.js"></script>

  <!-- Red de seguridad: fuerza runtime clásico aunque se cambie la versión de Babel. -->
  <script>
    if (window.Babel && Babel.availablePresets && Babel.availablePresets.react) {
      Babel.registerPreset('react', {
        presets: [[Babel.availablePresets.react, { runtime: 'classic' }]]
      });
    }
  </script>

  <!-- Recharts para visualizaciones de datos -->
  <script src="./assets/vendor/prop-types/prop-types.min.js"></script>
  <script src="./assets/vendor/recharts/Recharts.js"></script>

  <!-- Leaflet JS (para mapas en sesión 5) -->
  <script src="./assets/vendor/leaflet/leaflet.js"></script>
</head>

<body>
  <!-- Punto de montaje de React -->
  <div id="root"></div>

  <!-- ========================================================
       CARGA DE COMPONENTES SIAN (orden importa)
       Todos los archivos JSX se transforman en runtime con Babel.
       ======================================================== -->

  <!-- 1. Utilidades base -->
  <script src="./js/utils/i18n.js"></script>
  <script src="./js/utils/store.js"></script>
  <script src="./js/utils/router.js"></script>
  <script src="./js/utils/helpers.js"></script>
  <script src="./js/utils/nutricion.js"></script>
  <script src="./js/utils/antropometria.js"></script>

  <!-- 2. Componentes (necesitan JSX → type=text/babel) -->
  <script type="text/babel" src="./js/components/Sidebar.js"></script>
  <script type="text/babel" src="./js/components/Topbar.js"></script>
  <script type="text/babel" src="./js/components/Footer.js"></script>
  <script type="text/babel" src="./js/components/Layout.js"></script>
  <script type="text/babel" src="./js/components/KPI.js"></script>
  <script type="text/babel" src="./js/components/ChartCard.js"></script>
  <script type="text/babel" src="./js/components/DataTable.js"></script>
  <script type="text/babel" src="./js/components/FormStepper.js"></script>
  <script type="text/babel" src="./js/components/FormField.js"></script>
  <script type="text/babel" src="./js/components/Modal.js"></script>
  <script type="text/babel" src="./js/components/PersonPicker.js"></script>

  <!-- 3. Páginas -->
  <script type="text/babel" src="./js/pages/Login.js"></script>
  <script type="text/babel" src="./js/pages/Placeholder.js"></script>
  <script type="text/babel" src="./js/pages/Dashboard.js"></script>
  <script type="text/babel" src="./js/pages/Encuestados.js"></script>
  <script type="text/babel" src="./js/pages/BuscarDNI.js"></script>
  <script type="text/babel" src="./js/pages/Socioeconomico.js"></script>
  <script type="text/babel" src="./js/pages/Antropometria.js"></script>
  <script type="text/babel" src="./js/pages/Alimentos.js"></script>
  <script type="text/babel" src="./js/pages/Recetas.js"></script>
  <script type="text/babel" src="./js/pages/R24.js"></script>
  <script type="text/babel" src="./js/pages/Longitudinal.js"></script>
  <script type="text/babel" src="./js/pages/MapaGeografico.js"></script>
  <script type="text/babel" src="./js/pages/Reportes.js"></script>
  <script type="text/babel" src="./js/pages/Cohortes.js"></script>
  <script type="text/babel" src="./js/pages/Catalogos.js"></script>
  <script type="text/babel" src="./js/pages/Usuarios.js"></script>
  <script type="text/babel" src="./js/pages/Auditoria.js"></script>
  <script type="text/babel" src="./js/pages/Exportar.js"></script>

  <!-- 4. Aplicación principal (último, depende de todo lo anterior) -->

</body>
</html>
